syntax = "proto3";

package payment;

// gRPC service definition
service PaymentService {
  rpc CreatePayment (CreatePaymentRequest) returns (CreatePaymentResponse);
}

// Request from orchestrator
message CreatePaymentRequest {
  string patient_id = 1;
  int32 amount = 2;              // in cents (e.g. 5000 = $50.00)
  string currency = 3;           // "usd", "sgd"
  string consultation_id = 4;
}

// Response back to orchestrator
message CreatePaymentResponse {
  string payment_url = 1;        // Stripe Checkout लिंक
  string payment_intent_id = 2;
  string status = 3;             // "pending"
}