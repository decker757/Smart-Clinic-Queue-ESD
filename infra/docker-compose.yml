services:

  # ─── API Gateway (DB-less) ───────────────────────────────────
  # Config is baked into the image via kong.yml.template + entrypoint.sh.
  # Copy infra/env/kong.env.example → infra/env/kong.env and fill in the RSA key.
  kong:
    build:
      context: ..
      dockerfile: infra/kong/Dockerfile
    env_file:
      - ./env/kong.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:3000
      COMPOSITE_APPOINTMENT_URL: http://composite-appointment:8000
      COMPOSITE_PATIENT_URL: http://composite-patient-orchestrator:8001
      COMPOSITE_CONSULTATION_URL: http://composite-consultation:8002
      COMPOSITE_STAFF_URL: http://composite-staff-orchestrator:8004
      DOCTOR_SERVICE_URL: http://doctor-service:3006
      QUEUE_COORDINATOR_URL: http://queue-coordinator-service:3002
      CHECKIN_ORCHESTRATOR_URL: http://checkin-orchestrator:8000
    ports:
      - "8000:8000"   # proxy
      - "8444:8001"   # admin API
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Message Broker ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Application Database ───────────────────────────────────
  app-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: clinic
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app", "-d", "clinic"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Services ───────────────────────────────────────────────
  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./env/auth.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  appointment-service:
    build:
      context: ..
      dockerfile: services/appointment-service/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./env/appointment.env
    depends_on:
      app-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  patient-service:
    build:
      context: ..
      dockerfile: services/patient-service/Dockerfile
    ports:
      - "3007:3007"
      - "50053:50053"
    env_file:
      - ./env/patient.env
    depends_on:
      app-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  queue-coordinator-service:
    build:
      context: ..
      dockerfile: services/queue-coordinator-service/Dockerfile
    ports:
      - "3002:3002"
      - "50052:50052"
    env_file:
      - ./env/queue-coordinator.env
    depends_on:
      app-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  eta-service:
    build:
      context: ..
      dockerfile: wrappers/eta-service/Dockerfile
    ports:
      - "50054:50054"
    env_file:
      - ./env/eta.env
    restart: unless-stopped

  notification-service:
    build:
      context: ..
      dockerfile: wrappers/notification-service/Dockerfile
    ports:
      - "3004:3004"
    env_file:
      - ./env/notification.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  activity-log-service:
    build:
      context: ..
      dockerfile: services/activity-log-service/Dockerfile
    ports:
      - "3005:3005"
    env_file:
      - ./env/activity-log.env
    depends_on:
      app-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  doctor-service:
    build:
      context: ..
      dockerfile: services/doctor-service/Dockerfile
    ports:
      - "3006:3006"
      - "50055:50055"
    env_file:
      - ./env/doctor.env
    depends_on:
      app-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  # ─── Composite Services ─────────────────────────────────────
  composite-appointment:
    build:
      context: ..
      dockerfile: composite/appointment/Dockerfile
    ports:
      - "8080:8000"
    env_file:
      - ./env/composite-appointment.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  checkin-orchestrator:
    build:
      context: ../composite/check-in orchestrator
    container_name: checkin-orchestrator
    ports:
      - "8085:8000"  # HOST_PORT:CONTAINER_PORT
    env_file:
      - ./env/checkin-orchestrator.env

  composite-patient-orchestrator:
    build:
      context: ..
      dockerfile: composite/patient-orchestrator/Dockerfile
    ports:
      - "8082:8001"
    env_file:
      - ./env/composite-patient-orchestrator.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      patient-service:
        condition: service_started
    restart: unless-stopped

  composite-staff-orchestrator:
    build:
      context: ..
      dockerfile: composite/staff-orchestrator/Dockerfile
    ports:
      - "8084:8004"
    env_file:
      - ./env/composite-staff-orchestrator.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      doctor-service:
        condition: service_started
      patient-service:
        condition: service_started
      queue-coordinator-service:
        condition: service_started
    restart: unless-stopped

  composite-consultation:
    build:
      context: ..
      dockerfile: composite/consultation/Dockerfile
    ports:
      - "8083:8002"
    env_file:
      - ./env/composite-consultation.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      patient-service:
        condition: service_started
      doctor-service:
        condition: service_started
      appointment-service:
        condition: service_started
      queue-coordinator-service:
        condition: service_started
      payment-service:
        condition: service_started
    restart: unless-stopped

  payment-service:
    build:
      context: ..
      dockerfile: services/payment-service-stub/Dockerfile
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: frontend/vue-app/Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/vue-app:/app        # mount source for hot reload
      - frontend-node-modules:/app/node_modules  # keep container's node_modules
    environment:
      # Browser-side var — points at Kong on the host machine
      VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped

volumes:
  app-db-data:
  rabbitmq-data:
  frontend-node-modules:
