asyncapi: 2.6.0

info:
  title: Check-in Orchestrator — AMQP API
  version: 1.1.0
  description: |
    Publishes queue state events to the `clinic.events` topic exchange after
    a patient checks in via HTTP.

    Two check-in paths exist:
    - **Specific booking** (`appointment_time` provided): travel ETA is compared
      against the slot time. On-time → `queue.checked_in`. Late → `queue.late_detected`
      + a 10-minute TTL dead-letter queue is armed; if no confirmation → `queue.removed`.
    - **Generic session booking** (`appointment_time` absent): late detection is skipped;
      `queue.checked_in` is published immediately.

servers:
  production:
    url: '{RABBITMQ_URL}'
    protocol: amqp
    description: CloudAMQP hosted broker

channels:
  queue.checked_in:
    description: |
      Published when a patient checks in. For specific bookings this means their
      travel ETA is within the appointment window. For generic session bookings
      this fires immediately on check-in regardless of time.
      Queue-coordinator moves the patient to checked_in status.
    publish:
      operationId: onQueueCheckedIn
      summary: Patient checked in
      message:
        $ref: '#/components/messages/QueueCheckedIn'

  queue.late_detected:
    description: |
      Published only for specific-doctor bookings when the patient's travel ETA
      exceeds their appointment slot time. Notification service sends an SMS
      asking the patient to confirm they are still coming. A 10-minute TTL
      dead-letter queue is armed simultaneously — if no confirmation arrives
      within 10 minutes the message is dead-lettered as `queue.removed`.
    publish:
      operationId: onQueueLateDetected
      summary: Late patient detected — SMS confirmation requested
      message:
        $ref: '#/components/messages/QueueLateDetected'

  queue.deprioritized:
    description: |
      Published when a late patient confirms they are still on their way
      (POST /api/check-in/confirm with is_coming=true). Queue-coordinator moves
      them to the back of the queue with a new queue number and sets status to
      checked_in so they can be called by callNext.
    publish:
      operationId: onQueueDeprioritized
      summary: Patient deprioritized (confirmed late, moved to back as checked_in)
      message:
        $ref: '#/components/messages/QueueDeprioritized'

  queue.removed:
    description: |
      Published in two cases:
      1. Patient responds "no" to the late confirmation prompt.
      2. The 10-minute TTL dead-letter queue expires (patient did not respond).
      Queue-coordinator cancels the patient's queue entry.
    publish:
      operationId: onQueueRemoved
      summary: Patient removed from queue (no-response or declined)
      message:
        $ref: '#/components/messages/QueueRemoved'

components:
  messages:
    QueueCheckedIn:
      name: QueueCheckedIn
      contentType: application/json
      payload:
        type: object
        required: [appointment_id, patient_id]
        properties:
          appointment_id:
            type: string
            format: uuid
          patient_id:
            type: string
          eta_minutes:
            type: integer
            nullable: true
            description: Travel ETA in minutes. Present for specific bookings, absent for generic.

    QueueLateDetected:
      name: QueueLateDetected
      contentType: application/json
      payload:
        type: object
        required: [appointment_id, patient_id]
        properties:
          appointment_id:
            type: string
            format: uuid
          patient_id:
            type: string
          eta_minutes:
            type: integer
            description: Estimated travel time in minutes

    QueueDeprioritized:
      name: QueueDeprioritized
      contentType: application/json
      payload:
        type: object
        required: [appointment_id, patient_id]
        properties:
          appointment_id:
            type: string
            format: uuid
          patient_id:
            type: string

    QueueRemoved:
      name: QueueRemoved
      contentType: application/json
      payload:
        type: object
        required: [appointment_id, patient_id]
        properties:
          appointment_id:
            type: string
            format: uuid
          patient_id:
            type: string
