name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/vue-app/package-lock.json

      - run: npm ci

      - run: npm run lint

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/vue-app/package-lock.json

      - run: npm ci

      - run: npm run test:unit -- --run

  consultation-tests:
    name: Consultation Orchestrator Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: composite/consultation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements-dev.txt

      - name: Generate proto stubs
        run: |
          python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. \
            src/proto/doctor.proto src/proto/patient.proto \
            src/proto/queue.proto src/proto/payment.proto

      - run: pytest

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  e2e-test:
    name: E2E Tests
    if: false # enable when frontend is ready
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/vue-app/package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build

      - run: npm run test:e2e -- --project=chromium
