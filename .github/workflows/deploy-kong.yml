name: Deploy Kong

on:
  push:
    branches: [main]
    paths:
      - 'infra/kong/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/kong/**'

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service kong --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
